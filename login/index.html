
<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | LindiMaps Academy</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .logo-gradient { background: linear-gradient(to right, #3b82f6, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .academy-maps-text { background: linear-gradient(to right, #38bdf8, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-dot { animation: pulse-dot 2s infinite ease-in-out; transform-origin: center; }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .auth-bg {
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="auth-bg min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-[2px]"></div>

    <div class="relative w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <div class="h-16 w-16 flex items-center justify-center bg-slate-900 rounded-2xl shadow-2xl mb-4 border border-slate-700">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="white" fill-opacity="0.2"/>
                    <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                    <circle class="animate-dot" cx="12" cy="11" r="2.5" fill="#3b82f6" stroke="white" stroke-width="1.2"/>
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase">
                LINDI<span class="academy-maps-text">MAPS</span>
            </h1>
            <span class="text-[10px] uppercase tracking-[0.4em] font-bold text-blue-400">Academy Portal</span>
        </div>

        <div class="glass-card w-full rounded-[2.5rem] shadow-2xl p-8 md:p-10">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight uppercase">Mirëseerdhët</h2>
                <p class="text-slate-500 text-sm font-medium mt-2">Hyni për të aksesuar materialet e inteligjencës hapësinore.</p>
            </div>

            <div id="msg" class="hidden mb-6 p-4 rounded-2xl text-sm font-semibold border"></div>

            <form id="authForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email Adresa</label>
                    <input id="email" type="email" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-900 placeholder:text-slate-300"
                        placeholder="emri@shembull.com" />
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Fjalëkalimi</label>
                    <input id="password" type="password" required minlength="6"
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-900 placeholder:text-slate-300"
                        placeholder="••••••••" />
                </div>

                <button id="loginBtn" type="submit"
                    class="w-full bg-slate-900 hover:bg-blue-600 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-blue-900/10 uppercase text-xs tracking-[0.2em]">
                    Hyr në Platformë
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 flex flex-col gap-4">
                <button id="signupBtn"
                    class="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-4 rounded-2xl transition-all uppercase text-[10px] tracking-widest">
                    Krijo llogari të re
                </button>

                <button id="resetBtn"
                    class="text-blue-600 hover:text-blue-700 font-bold text-xs uppercase tracking-wider">
                    Keni harruar fjalëkalimin?
                </button>
            </div>

            <div class="mt-8 text-center">
                <a href="/" class="text-slate-400 hover:text-slate-600 text-[10px] uppercase font-bold tracking-[0.2em] inline-flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Kthehu te Kreu
                </a>
            </div>
        </div>

        <p class="text-center mt-8 text-white/40 text-[10px] font-bold uppercase tracking-[0.3em]">
            © 2024 LindiMaps Studio • Spatial Intelligence
        </p>
    </div>

  <script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://fujqjgcciajwfbsvmlnk.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1anFqZ2NjaWFqd2Zic3ZtbG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MTgwOTQsImV4cCI6MjA4NDk5NDA5NH0.0FGl0sxQTuIkSB_xPmEYwyE4-rsAdIZlIQcRWgtqJh4";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Helpers
  const $ = (id) => document.getElementById(id);

  async function signUp() {
    const email = $("email").value.trim();
    const password = $("password").value;
    const fullName = $("full_name").value.trim();

    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullName },
        emailRedirectTo: `${location.origin}/academy/`
      }
    });

    if (error) return alert(error.message);

    // Nëse e ke OFF "Confirm email", do hyjë direkt.
    // Nëse e ke ON, do kërkojë konfirmim emaili.
    alert("U regjistrua! Kontrollo emailin nëse kërkohet konfirmim.");
  }

  async function signIn() {
    const email = $("email").value.trim();
    const password = $("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return alert(error.message);

    // redirect pas login
    window.location.href = "/academy/";
  }

  async function signOut() {
    await supabase.auth.signOut();
    window.location.href = "/login/";
  }

  // nëse useri është logged-in, çoje direkt te academy
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = "/academy/";
  })();

  // ekspozo funksionet për onclick
  window.signUp = signUp;
  window.signIn = signIn;
  window.signOut = signOut;
</script>

</body>
</html>
